<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="logo.png" />
    <title>bansibo world</title>
    <style>
      html {
        cursor: url('carpeta-de-fotos/cursor.png'), auto;
      }
      body {
        background-color: #8bff00;
        font-family: sans-serif;
        text-align: center;
        margin: 0;
      }
      .bansibo {
        max-width: 100%;
        height: auto;
        &:hover {
          animation: dance 2s 0s infinite;
        }
      }
      @keyframes dance {
        0% {
          transform: rotate(0deg) scale(1);
        }
        10% {
          transform: rotate(15deg) scale(0.3);
        }
        50% {
          transform: rotate(-180deg) scale(1.1);
        }
        100% {
          transform: rotate(-360deg) scale(1);
        }
      }
      h1 {
        font-size: 4em;
      }
      nav {
        background-color: #ad00dd;
        display: flex;
        align-items: center;
        padding: 0 6px;
        .logo {
          margin-right: auto;
          display: flex;
          img {
            width: 50px;
            height: 50px;
          }
        }
        .link {
          color: white;
          text-decoration: none;
          padding: 20px;
          font-size: 1.5em;
        }
      }
    </style>      
  </head>
  <body>
    <nav>
      <a href="." class="logo"><img src="logo.png" /></a>
      <a href="." class="link">Inicio</a>
      <a href="https://github.com/luis-y-bansibo" class="link">GitHub</a>
    </nav>
    <h1>Hola, me llamo Luis ⌨️💻🖱️💿️🕹️</h1>
    <img src="carpeta-de-fotos/bansibo.png" class="bansibo" alt="Bansibo" />
  </body>
</html>
